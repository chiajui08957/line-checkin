<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>打卡系統</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>GPS打卡系統</h2>

<button onclick="clock('上班')">上班</button>
<button onclick="clock('下班')">下班</button>

<script>

let userId = "";

async function init() {
  await liff.init({ liffId: "2009933192-9PJMT56a" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  userId = liff.getContext().userId;
}

async function clock(type) {

  const pos = await getLocation();
  const profile = await liff.getProfile();

  const data = {
    userId: userId,
    name: profile.displayName,
    type: type,
    lat: pos.lat,
    lng: pos.lng
  };

  fetch("https://script.google.com/macros/s/AKfycbxzqndus7dBGMHwYtfuyb1eJjdLLTL6cJMOAXhg9QJeFGlFUFSns5QFB8bukJnW7zsFpw/exec", {
    method: "POST",
    body: new URLSearchParams(data)
  })
  .then(r => r.json())
  .then(res => alert(res.msg))
  .catch(err => alert("錯誤：" + err));
}

function getLocation() {
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(pos => {
      resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      });
    });
  });
}

init();

</script>

</body>
</html>
