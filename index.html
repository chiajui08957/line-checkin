<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>打卡系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
<h2>GPS 打卡系統</h2>

<button onclick="clock('上班')">上班</button>
<button onclick="clock('下班')">下班</button>

<script>
async function init() {
  await liff.init({ liffId: "2009933192-9PJMT56a" });

  if (!liff.isLoggedIn()) {
    liff.login();
  }
}

async function clock(type) {
  const pos = await getLocation();

  const profile = await liff.getProfile();

  const data = {
    userId: profile.userId,
    name: profile.displayName,
    type: type,
    lat: pos.lat,
    lng: pos.lng
  };

  fetch("https://script.google.com/macros/s/AKfycbwnzERCGk28Esa6BryjHUKH34dxLD-bBRkocP9TAkJ_VLfAmMm8MUto06SWMwsXxSso/exec", {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    alert(res.msg);
  });
}

function getLocation() {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(pos => {
      resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      });
    });
  });
}

init();
</script>
</body>
</html>
