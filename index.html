<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<button onclick="go('上班')">上班</button>
<button onclick="go('下班')">下班</button>

<script>
const LIFF_ID = "2009933192-9PJMT56a";

liff.init({ liffId: LIFF_ID }).then(() => {
  if (!liff.isLoggedIn()) liff.login();
});

async function go(action) {
  const profile = await liff.getProfile();

  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const ip = await fetch('https://api.ipify.org?format=json')
      .then(r=>r.json()).then(d=>d.ip);

    const res = await fetch("https://script.google.com/macros/s/AKfycbw3M5TbYjPrN8Uo7SmygKQa2fm2_pc5CNHgDqQ8tcCSlXjK-0VqIUxERf-QbPfqQDPFVg/exec", {
      method: "POST",
      body: JSON.stringify({
        action: "checkin",
        userId: profile.userId,
        lat: lat,
        lng: lng,
        action: action,
        ip: ip
      })
    });

    const result = await res.json();
    alert(result.msg);

  }, () => {
    alert("GPS取得失敗");
  });
}
</script>

<style>
button {
  width: 85%;
  max-width: 320px;
  padding: 18px;
  margin: 12px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #00c300;
  color: white;
}
</style>

</body>
</html>
