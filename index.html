<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
button {
  width: 85%;
  max-width: 320px;
  padding: 18px;
  margin: 12px;
  font-size: 18px;
  border: none;
  border-radius: 12px;
  background: #00c300;
  color: white;
}
</style>
</head>

<body>

<button onclick="checkin('上班')">上班打卡</button>
<button onclick="checkin('下班')">下班打卡</button>

<script>
let userId="";

async function init(){
  await liff.init({ liffId: "2009933192-9PJMT56a" });

  if(!liff.isLoggedIn()){
    liff.login();
  }

  const profile = await liff.getProfile();
  userId = profile.userId;
}

async function checkin(type){
  navigator.geolocation.getCurrentPosition(async pos=>{
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    const url = "https://script.google.com/macros/s/AKfycbxiA8ZNEjF_3J6XuueZayJwg2OoKTy2o6OcMYG6vuT4S0RuAkCV7a8YNWuX8U4_FZj4qw/exec"
      + "?userId="+userId
      + "&action="+type
      + "&lat="+lat
      + "&lng="+lng;

    const res = await fetch(url);
    const text = await res.text();

    alert(text);

  },()=>{
    alert("無法取得GPS");
  });
}

init();
</script>

</body>
</html>
