<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打卡測試</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
  padding: 20px;
}

button {
  width: 80%;
  max-width: 300px;
  padding: 16px;
  margin: 10px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #00c300;
  color: white;
}
</style>
</head>

<body>

<h2>打卡測試頁</h2>

<button onclick="testClick('上班')">上班</button>
<button onclick="testClick('下班')">下班</button>

<script>

console.log("JS已載入");

async function init() {
  try {
    await liff.init({ liffId: "2009933192-9PJMT56a" });
    console.log("LIFF OK");
  } catch (e) {
    console.log("LIFF失敗", e);
  }
}

function testClick(type) {
  alert("按鈕有反應：" + type);
  console.log("click:", type);
}

init();

</script>

</body>
</html>
