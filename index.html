<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>打卡系統</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>GPS打卡系統</h2>

<button onclick="clock('上班')">上班</button>
<button onclick="clock('下班')">下班</button>

<script>

let userId = "";

async function init() {
  await liff.init({ liffId: "2009933192-9PJMT56a" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  userId = liff.getContext().userId;
}

async function clock(type) {

  const pos = await getLocation();
  const profile = await liff.getProfile();

  const data = {
    userId: userId,
    name: profile.displayName,
    type: type,
    lat: pos.lat,
    lng: pos.lng
  };

  fetch("https://script.google.com/macros/s/AKfycbx63X_CIK1pZ2-UE3J5tkQPQy_W2ndAwmJ4MhmvnN9n1M95RCpJ2GL8VVvJfCbFkyUvAA/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })
  .then(async r => {
    const text = await r.text();
    console.log("GAS回應:", text);
    return JSON.parse(text);
  })
  .then(res => alert(res.msg))
  .catch(err => alert("錯誤：" + err));
}

function getLocation() {
  return new Promise((resolve) => {
    navigator.geolocation.getCurrentPosition(pos => {
      resolve({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude
      });
    });
  });
}

init();

</script>

</body>
</html>
